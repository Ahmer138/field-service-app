services:
  postgres:
    image: postgres:16
    container_name: fsa_postgres
    environment:
      POSTGRES_USER: fsa
      POSTGRES_PASSWORD: fsa_password
      POSTGRES_DB: fsa_db
    ports:
      - "5432:5432"
    volumes:
      - fsa_pgdata:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    container_name: fsa_minio
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio_password
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - fsa_minio_data:/data

volumes:
  fsa_pgdata:
  fsa_minio_data:
