services:
  db:
    image: postgres:16
    container_name: field-service-db
    environment:
      POSTGRES_DB: fsa_db
      POSTGRES_USER: fsa
      POSTGRES_PASSWORD: fsa_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    container_name: field-service-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio_password
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  api:
    build:
      context: .
    container_name: field-service-api
    depends_on:
      - db
      - minio
    environment:
      DATABASE_URL: postgresql+psycopg://fsa:fsa_password@db:5432/fsa_db
      SECRET_KEY: CHANGE_ME_TO_A_LONG_RANDOM_STRING
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 60
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minio
      MINIO_SECRET_KEY: minio_password
      MINIO_BUCKET_NAME: job-update-photos
      MINIO_SECURE: false
      LOCATION_STALE_AFTER_MINUTES: 5
      PRESENCE_ONLINE_AFTER_MINUTES: 2
      DISPLAY_TIMEZONE: Asia/Dubai
    ports:
      - "8000:8000"
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"

volumes:
  postgres_data:
  minio_data:
