name: Backend CI

on:
  push:
    paths:
      - "**/*.py"
      - "requirements.txt"
      - "pytest.ini"
      - "pyrightconfig.json"
      - "README.md"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    paths:
      - "**/*.py"
      - "requirements.txt"
      - "pytest.ini"
      - "pyrightconfig.json"
      - "README.md"
      - ".github/workflows/backend-ci.yml"

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run test suite
        run: python -m pytest -q
