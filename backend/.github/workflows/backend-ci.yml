name: Backend CI

on:
  push:
    paths:
      - "**/*.py"
      - "alembic.ini"
      - "requirements.txt"
      - "requirements-dev.txt"
      - "pytest.ini"
      - "pyrightconfig.json"
      - "README.md"
      - "BACKEND_CHECKLIST.md"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    paths:
      - "**/*.py"
      - "alembic.ini"
      - "requirements.txt"
      - "requirements-dev.txt"
      - "pytest.ini"
      - "pyrightconfig.json"
      - "README.md"
      - "BACKEND_CHECKLIST.md"
      - ".github/workflows/backend-ci.yml"

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt

      - name: Run Ruff
        run: python -m ruff check .

      - name: Run Pyright
        run: python -m pyright

  migration-smoke:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: fsa_db
          POSTGRES_USER: fsa
          POSTGRES_PASSWORD: fsa_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U fsa -d fsa_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+psycopg://fsa:fsa_password@127.0.0.1:5432/fsa_db

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt

      - name: Run Alembic migrations
        run: alembic upgrade head

  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt

      - name: Run test suite
        run: python -m pytest -q
