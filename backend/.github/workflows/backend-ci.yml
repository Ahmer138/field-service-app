name: Backend CI

on:
  push:
    paths:
      - "**/*.py"
      - "requirements.txt"
      - "requirements-dev.txt"
      - "pytest.ini"
      - "pyrightconfig.json"
      - "README.md"
      - "BACKEND_CHECKLIST.md"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    paths:
      - "**/*.py"
      - "requirements.txt"
      - "requirements-dev.txt"
      - "pytest.ini"
      - "pyrightconfig.json"
      - "README.md"
      - "BACKEND_CHECKLIST.md"
      - ".github/workflows/backend-ci.yml"

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt

      - name: Run Ruff
        run: python -m ruff check .

      - name: Run Pyright
        run: python -m pyright

  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt

      - name: Run test suite
        run: python -m pytest -q
